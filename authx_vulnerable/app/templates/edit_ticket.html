{% extends 'base.html' %}

{% block content %}
<div style="border: 1px solid #ccc; padding: 20px; background-color: #fff;">
    <h2>Editează Ticket #{{ ticket['id'] }} (v1 - Vulnerabil)</h2>
    
    <form action="{{ url_for('edit_ticket', ticket_id=ticket['id']) }}" method="POST">
        <label>Titlu:</label><br>
        <input type="text" name="title" value="{{ ticket['title'] }}" style="width: 100%; padding: 8px;"><br><br>
        
        <label>Descriere (Vulnerabil XSS):</label><br>
        <textarea name="description" rows="5" style="width: 100%; padding: 8px;">{{ ticket['description'] }}</textarea><br><br>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" style="background-color: #4CAF50; color: white; padding: 10px 15px; border: none; cursor: pointer;">
                Salvează Modificările
            </button>
            <a href="{{ url_for('dashboard') }}" style="padding: 10px 15px; background-color: #ccc; text-decoration: none; color: black;">Anulează</a>
        </div>
    </form>
</div>
{% endblock %}
