{% extends 'base.html' %}

{% block content %}
<div class="content-box">
    <h2>Editează Tichetul #{{ ticket['id'] }}</h2>
    <form action="{{ url_for('edit_ticket', ticket_id=ticket['id']) }}" method="POST">
        <div style="margin-bottom:15px;">
            <label>Titlu:</label><br>
            <input type="text" name="title" value="{{ ticket['title'] }}" required style="width:100%; padding:8px;">
        </div>
        <div style="margin-bottom:15px;">
            <label>Descriere:</label><br>
            <textarea name="description" rows="5" required style="width:100%; padding:8px;">{{ ticket['description'] }}</textarea>
        </div>
        <button type="submit" class="btn-success" style="background-color:#007bff; color:white; border:none; padding:10px 20px; border-radius:5px;">Salvează Modificările</button>
        <a href="{{ url_for('dashboard') }}" style="margin-left:10px;">Anulează</a>
    </form>
</div>
{% endblock %}
