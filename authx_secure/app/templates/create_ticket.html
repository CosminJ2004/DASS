{% extends 'base.html' %}

{% block content %}
<div class="dashboard-header">
    <h2>Creare Tichet Suport</h2>
    <p>Completează detaliile de mai jos pentru a deschide un tichet nou. Acțiunea va fi înregistrată în logurile de securitate.</p>
</div>

<div class="content-box">
    <form action="{{ url_for('create_ticket') }}" method="POST" style="display: flex; flex-direction: column; gap: 15px; max-width: 500px;">
        
        <div>
            <label for="title"><strong>Titlu Tichet:</strong></label><br>
            <input type="text" id="title" name="title" required placeholder="Ex: Eroare la conectare VPN" style="width: 100%; padding: 8px;">
        </div>

        <div>
            <label for="description"><strong>Descriere problemă:</strong></label><br>
            <textarea id="description" name="description" rows="5" required placeholder="Oferă cât mai multe detalii..." style="width: 100%; padding: 8px;"></textarea>
        </div>

        <div>
            <label for="severity"><strong>Severitate:</strong></label><br>
            <select id="severity" name="severity" style="width: 100%; padding: 8px;">
                <option value="LOW">Scăzută (LOW) - Nu blochează lucrul</option>
                <option value="MED">Medie (MED) - Dificultăți parțiale</option>
                <option value="HIGH">Ridicată (HIGH) - Sistem blocat total</option>
            </select>
        </div>

        <div style="margin-top: 10px; display: flex; gap: 10px;">
            <button type="submit" style="background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Trimite Tichetul</button>
            <a href="{{ url_for('dashboard') }}" style="padding: 10px 20px; text-decoration: none; color: #333; background-color: #eee; border-radius: 5px;">Anulează</a>
        </div>
    </form>
</div>
{% endblock %}
